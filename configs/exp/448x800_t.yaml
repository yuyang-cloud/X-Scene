# @package _global_
defaults:
  - /dataset/Nuscenes_map_cache_box_t
  # - /runner/default_t
  - model: ../../model/video_unet
  - _self_  # make sure override

# NOTE: we do not handle map explicitly, since on cache miss, our code can get
# the map from whole nuscenes map correctly. Therefore, we assume map is always
# available to every frame.

# based on 0.1.3, use non-key frames
task_id: 448x800_t
log_root_prefix: ./work_dirs/x-scene-video_448x800
runner:
    # validation_index: [204, 899, 1828, 3090] # total 4969
    validation_index: [138, 632, 1301, 2342] # should match above
    # validation_before_run: false
    enable_unet_checkpointing: true
    pipeline_param:
      keyframe_rate: 6
    num_train_epochs: 100
    save_model_per_epoch: 10
dataset:
  image_size: [448, 800]
  augment2d:
    resize: [[0.5, 0.5]]
  dataset_root: ./data/nuscenes
  dataset_type: NuScenesTDataset
  dataset_cache_file_tag: 200x200_12Hz_interp
  start_on_keyframe: true
  data:
    train:
      ann_file: ${...dataset_process_root}nuscenes_interp_12Hz_infos_train.pkl
      video_length: ${model.video_length}
      start_on_keyframe: ${dataset.start_on_keyframe}
      ref_length: ${model.ref_length}
      candidate_length: 5 
    val:
      ann_file: ${...dataset_process_root}nuscenes_interp_12Hz_infos_val.pkl
      video_length: ${model.video_length}
      start_on_keyframe: ${dataset.start_on_keyframe}
      ref_length: ${model.ref_length}
      candidate_length: 5
    test:
      ann_file: ${...dataset_process_root}nuscenes_interp_12Hz_infos_val.pkl
      video_length: ${model.video_length}
      start_on_keyframe: ${dataset.start_on_keyframe}
      ref_length: ${model.ref_length}
      candidate_length: 5
      
model:
  fix_controlnet: false
  pretrained_img_unet: pretrained/x-scene-video_336x600
  sc_attn_index:
    - [0, 6, 0]  # keyframe
    - [0, 6, 0]
    - [0, 6, 1]
    - [0, 6, 2]
    - [0, 6, 3]
    - [0, 6, 4]
    - [0, 6, 5]  # keyframe
  unet:
    transformer_type: _ff_last  # tune-a-video
    zero_module_type2: none
    spatial_trainable: true

  controlnet:
    map_embedder_cls: xscene.networks.map_embedder.BEVControlNetConditioningEmbedding
    map_embedder_param: 
      conditioning_size: ${..map_size}
      block_out_channels: ${..conditioning_embedding_out_channels}
      output_size: [56, 100]

  scene_embedder_cls: xscene.networks.scene_position_embedder.ScenePositionEmbedding
  scene_embedder_dir: scene_embedder
  scene_embedder:
    embed_dims: 320
    LID: false
    output_size: [56, 100]