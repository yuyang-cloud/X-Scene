# @package _global_
defaults:
  - /dataset/Nuscenes_cache
  # - /runner/8gpus
  - model: ../../model/occ_unet
  - _self_  # make sure override

task_id: occ
log_root_prefix: ./work_dirs/x-scene-occ-hdmap
model:
  use_map_cond: true  # use map condition
  use_cross_attn_cond: false # use text and bbox condition
  map_cond_type: 'hd_map' # map condition use bev_seg(dense_mask) or hd_map(sparse_vector)
runner:
  train_batch_size: 12
  num_train_epochs: 1000
  validation_show_box: true
  enable_xformers_memory_efficient_attention: true  # always need this.
  bbox_add_ratio: 0
